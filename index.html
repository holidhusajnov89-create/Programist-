<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель загрузки и запуска файлов</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; height: 100vh; overflow: hidden; }
        
        /* Левая колонка: Загрузка и список */
        .left-panel { width: 350px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; border-right: 2px solid #1a252f; }
        .panel-title { font-size: 18px; margin-bottom: 20px; color: #1abc9c; border-bottom: 1px solid #34495e; padding-bottom: 5px; }
        
        /* Кнопка выбора файла на устройстве */
        .file-upload-btn { display: block; background: #3498db; color: white; padding: 12px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 25px; transition: 0.2s; }
        .file-upload-btn:hover { background: #2980b9; }
        #file-chooser { display: none; }
        
        /* Отдельный отсек для сохраненных файлов */
        .files-box { flex-grow: 1; overflow-y: auto; }
        .file-card { background: #34495e; border: 1px solid #455a64; padding: 12px; border-radius: 4px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .file-card:hover { border-color: #1abc9c; background: #3d566e; }
        .file-card.active-file { background: #16a085; border-color: #1abc9c; }
        .file-name { font-weight: bold; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
        .btn-delete:hover { background: #c0392b; }

        /* Правая колонка: Зона запуска */
        .right-panel { flex-grow: 1; background: #fff; display: flex; flex-direction: column; height: 100%; }
        .run-header { background: #ffffff; padding: 15px 20px; border-bottom: 1px solid #e0e0e0; font-weight: bold; color: #2c3e50; }
        .iframe-container { flex-grow: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        .welcome-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #7f8c8d; font-size: 15px; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <!-- ЛЕВАЯ ЧАСТЬ: Загрузчик и Отсек файлов -->
    <div class="left-panel">
        <div class="panel-title">Добавить HTML файл</div>
        
        <!-- Реальная кнопка выбора файла с телефона или ПК -->
        <label class="file-upload-btn">
            📁 Выбрать файл на устройстве
            <input type="file" id="file-chooser" accept=".html" onchange="uploadFile(this.files)">
        </label>

        <div class="panel-title">Отсек сохраненных файлов</div>
        <div class="files-box" id="htmlFilesContainer">
            <!-- Сюда добавляются файлы по одному -->
        </div>
    </div>

    <!-- ПРАВАЯ ЧАСТЬ: Отдельный запуск выбранного файла -->
    <div class="right-panel">
        <div class="run-header">
            Статус запуска: <span id="runningFileName" style="color: #16a085;">Файл не выбран</span>
        </div>
        <div class="iframe-container">
            <div id="noFileMsg" class="welcome-text">
                Нажмите на кнопку слева, чтобы добавить файлы со своего телефона или ПК.<br>Затем выберите нужный файл из списка для его отдельного запуска.
            </div>
            <iframe id="codeExecutor" style="display: none;"></iframe>
        </div>
    </div>

<script>
    // При старте страницы выводим файлы, если они уже были сохранены ранее
    document.addEventListener("DOMContentLoaded", displayFilesList);

    // Функция считывания и добавления файла с телефона/ПК на страницу
    function uploadFile(files) {
        if (files.length === 0) return;
        const file = files[0];

        const reader = new FileReader();
        reader.onload = function(e) {
            const fileContent = e.target.result; // Текст кода внутри файла
            const fileName = file.name;         // Имя файла

            // Загружаем текущую базу данных из памяти браузера
            let myFilesBase = JSON.parse(localStorage.getItem('my_html_base')) || [];

            // Проверяем, нет ли уже файла с таким именем
            const existIdx = myFilesBase.findIndex(f => f.name.toLowerCase() === fileName.toLowerCase());
            if (existIdx !== -1) {
                if (!confirm(`Файл с именем "${fileName}" уже добавлен. Перезаписать его новым кодом?`)) return;
                myFilesBase[existIdx].code = fileContent;
            } else {
                // Добавляем файл в список
                myFilesBase.push({ name: fileName, code: fileContent });
            }

            // Сохраняем обратно в память
            localStorage.setItem('my_html_base', JSON.stringify(myFilesBase));
            
            // Сбрасываем инпут выбора файла, чтобы можно было выбрать его же повторно
            document.getElementById('file-chooser').value = '';

            // Обновляем список на экране
            displayFilesList();
        };

        // Запуск чтения файла как текста
        reader.readAsText(file, "UTF-8");
    }

    // Вывод списка добавленных файлов в левый отсек
    function displayFilesList() {
        const container = document.getElementById('htmlFilesContainer');
        let myFilesBase = JSON.parse(localStorage.getItem('my_html_base')) || [];

        container.innerHTML = '';

        if (myFilesBase.length === 0) {
            container.innerHTML = '<p style="color:#bdc3c7; font-size:13px; text-align:center; padding-top:10px;">В отсеке нет файлов</p>';
            return;
        }

        myFilesBase.forEach((file, index) => {
            container.innerHTML += `
                <div class="file-card" id="file-id-${index}" onclick="runSingleFile(${index})">
                    <span class="file-name" title="${file.name}">📄 ${file.name}</span>
                    <button class="btn-delete" onclick="deleteFileFromList(event, ${index})">Удалить</button>
                </div>
            `;
        });
    }

    // ФУНКЦИЯ ОТДЕЛЬНОГО ЗАПУСКА ВЫБРАННОГО ФАЙЛА
    function runSingleFile(index) {
        let myFilesBase = JSON.parse(localStorage.getItem('my_html_base')) || [];
        const currentFile = myFilesBase[index];

        if (!currentFile) return;

        // Подсвечиваем активный файл в списке
        document.querySelectorAll('.file-card').forEach(card => card.classList.remove('active-file'));
        document.getElementById(`file-id-${index}`).classList.add('active-file');

        // Прячем стартовый текст, показываем окно запуска (iframe)
        document.getElementById('noFileMsg').style.display = 'none';
        const iframe = document.getElementById('codeExecutor');
        iframe.style.display = 'block';

        // Обновляем имя файла в шапке
        document.getElementById('runningFileName').innerText = currentFile.name;

        // Генерируем изолированную ссылку на код и запускаем его в iframe
        const blob = new Blob([currentFile.code], { type: 'text/html; charset=utf-8' });
        iframe.src = URL.createObjectURL(blob);
    }

    // Функция удаления файла из списка
    function deleteFileFromList(event, index) {
        event.stopPropagation(); // Отменяем вызов функции запуска при нажатии на кнопку удаления
        
        if (confirm("Вы хотите удалить этот файл из списка на странице?")) {
            let myFilesBase = JSON.parse(localStorage.getItem('my_html_base')) || [];
            myFilesBase.splice(index, 1);
            localStorage.setItem('my_html_base', JSON.stringify(myFilesBase));

            // Полный сброс экрана запуска
            document.getElementById('codeExecutor').style.display = 'none';
            document.getElementById('codeExecutor').src = '';
            document.getElementById('noFileMsg').style.display = 'block';
            document.getElementById('runningFileName').innerText = "Файл не выбран";

            displayFilesList();
        }
    }
</script>
</body>
</html>
